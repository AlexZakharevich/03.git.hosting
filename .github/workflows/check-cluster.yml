name: Local K8s Cluster Monitor

on:
  schedule:
    - cron: '1 * * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: self-hosted
    steps:
      - name: Send to Slack
        env:
          SLACK_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL: ${{ secrets.SLACK_CHANNEL_ID }}
          KUBECONFIG: /home/alex/.kube/config:/home/alex/.kube/config-k3s:/home/alex/.kube/config-k8s
        run: |
          REPORT=""
          
          for CTX in minikube k3s k8s; do
            REPORT="$REPORTв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓ\nрџ“Ќ $CTX\nв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓ\n"
            REPORT="$REPORTTime: $(date '+%a %b %d %H:%M:%S %z %Y')\nHost: $(hostname)\n\nPods:\n\`\`\`\n"
            
            REPORT="$REPORT$(kubectl get pods --all-namespaces --context="$CTX" --request-timeout=5s 2>&1 | head -20)\n\`\`\`\n\n"
          done
          
          TEXT=$(echo "$REPORT" | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))')
          curl -s -X POST -H "Authorization: Bearer $SLACK_TOKEN" -H "Content-Type: application/json" -d "{\"channel\":\"$SLACK_CHANNEL\",\"text\":$TEXT}" https://slack.com/api/chat.postMessage
