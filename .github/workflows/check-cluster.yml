name: Local K8s Cluster Monitor

on:
  schedule:
    - cron: '*/1 * * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: self-hosted
    steps:
      - name: Send status to Slack
        env:
          SLACK_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL: ${{ secrets.SLACK_CHANNEL_ID }}
        run: |
          # Получаем статус
          if kubectl get pods --all-namespaces | grep -qE "Error|CrashLoopBackOff|ImagePullBackOff|Pending"; then
            STATUS="FAILED"
            EMOJI="❌"
          else
            STATUS="OK"
            EMOJI="✅"
          fi
          
          # Отправляем через файл (избегаем проблем с экранированием)
          echo "$EMOJI K8s Monitor: $STATUS" > /tmp/slack_msg.txt
          echo "Time: $(date)" >> /tmp/slack_msg.txt
          echo "Host: $(hostname)" >> /tmp/slack_msg.txt
          echo "" >> /tmp/slack_msg.txt
          echo "Pods:" >> /tmp/slack_msg.txt
          kubectl get pods --all-namespaces >> /tmp/slack_msg.txt
          
          # Отправляем (однострочный curl)
          TEXT=$(cat /tmp/slack_msg.txt | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))')
          
          curl -X POST \
            -H "Authorization: Bearer $SLACK_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"channel\":\"$SLACK_CHANNEL\",\"text\":$TEXT}" \
            https://slack.com/api/chat.postMessage
