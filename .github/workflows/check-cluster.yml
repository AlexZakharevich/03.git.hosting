name: Local K8s Cluster Monitor

on:
  schedule:
    - cron: '1 * * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: self-hosted
    steps:
      - name: Send Slack notification
        env:
          SLACK_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL: ${{ secrets.SLACK_CHANNEL_ID }}
        run: |
          # Формируем сообщение
          MESSAGE="*🚢 Мониторинг Kubernetes*\n\n"
          MESSAGE="$MESSAGE*🕐 Время:* $(date '+%Y-%m-%d %H:%M:%S')\n"
          MESSAGE="$MESSAGE*🖥️ Хост:* $(hostname)\n\n"
          MESSAGE="$MESSAGE*📊 Состояние кластеров:*\n"
          
          ALL_OK=true
          
          for CONTEXT in $(kubectl config get-contexts -o name); do
            kubectl config use-context "$CONTEXT" &>/dev/null
            
            if ! kubectl cluster-info --request-timeout=5s &>/dev/null; then
              MESSAGE="$MESSAGE\n❌ *$CONTEXT* — НЕДОСТУПЕН"
              ALL_OK=false
              continue
            fi
            
            TOTAL_PODS=$(kubectl get pods --all-namespaces --no-headers 2>&1 | wc -l)
            PROBLEM_PODS=$(kubectl get pods --all-namespaces --no-headers 2>&1 | grep -cE "Error|CrashLoopBackOff|Pending" || echo "0")
            
            if [ "$PROBLEM_PODS" -gt 0 ]; then
              MESSAGE="$MESSAGE\n⚠️ *$CONTEXT* — ПРОБЛЕМЫ"
              MESSAGE="$MESSAGE   • Поды: $TOTAL_PODS (проблемных: $PROBLEM_PODS)"
              ALL_OK=false
            else
              MESSAGE="$MESSAGE\n✅ *$CONTEXT* — ЗДОРОВ"
              MESSAGE="$MESSAGE   • Поды: $TOTAL_PODS"
            fi
          done
          
          # Итог
          MESSAGE="$MESSAGE\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          if [ "$ALL_OK" = true ]; then
            MESSAGE="$MESSAGE\n🟢 *ИТОГ: ВСЕ КЛАСТЕРЫ РАБОТАЮТ*"
          else
            MESSAGE="$MESSAGE\n🔴 *ИТОГ: ЕСТЬ ПРОБЛЕМЫ!*"
          fi
          
          # Отправляем
          TEXT=$(echo "$MESSAGE" | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))')
          
          curl -X POST \
            -H "Authorization: Bearer $SLACK_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"channel\":\"$SLACK_CHANNEL\",\"text\":$TEXT}" \
            https://slack.com/api/chat.postMessage
          
          [ "$ALL_OK" = true ] && exit 0 || exit 1
