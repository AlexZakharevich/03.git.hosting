name: Local K8s Cluster Monitor (Simple)

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: self-hosted
    steps:
      - name: Check and notify
        env:
          SLACK_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL: ${{ secrets.SLACK_CHANNEL_ID }}
        run: |
          echo "=== Мониторинг Kubernetes ==="
          
          # Получаем данные
          ALL_PODS=$(kubectl get pods --all-namespaces)
          FAILED_PODS=$(kubectl get pods --all-namespaces --no-headers | grep -E "Error|CrashLoopBackOff|ImagePullBackOff|Pending" || true)
          
          # Формируем простое текстовое сообщение
          if [ -z "$FAILED_PODS" ]; then
            MESSAGE="✅ SUCCESS - Все поды работают нормально"
          else
            MESSAGE="❌ FAILED - Обнаружены проблемные поды!"
          fi
          
          # Отправляем в Slack (простой текст, без форматирования)
          curl -X POST \
            -H "Authorization: Bearer $SLACK_TOKEN" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "{
              \"channel\": \"$SLACK_CHANNEL\",
              \"text\": \"$MESSAGE\n\nВремя: $(date)\nХост: $(hostname)\n\nВсе поды:\n$(echo \"$ALL_PODS\" | sed 's/\"/\\\"/g')\n\n$( [ -n \"$FAILED_PODS\" ] && echo \"Проблемные поды:\n$(echo \"$FAILED_PODS\" | sed 's/\"/\\\"/g')\" )\"
            }" \
            https://slack.com/api/chat.postMessage
