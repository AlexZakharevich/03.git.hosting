name: Local K8s Cluster Monitor

on:
  schedule:
    - cron: '*/10 * * * *'   # каждые 10 минут
  workflow_dispatch:

jobs:
  monitor:
    runs-on: self-hosted    # Будет выполняться на вашем локальном runner
    steps:
      - name: Check pod status
        env:
          SLACK_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL: ${{ secrets.SLACK_CHANNEL_ID }}
        run: |
          echo "=== Мониторинг локального кластера Kubernetes ==="
          
          # Проверяем поды
          ALL_PODS=$(kubectl get pods --all-namespaces 2>&1)
          FAILED_PODS=$(kubectl get pods --all-namespaces --no-headers 2>&1 | grep -E "Error|CrashLoopBackOff|ImagePullBackOff|Pending" || true)
          
          if [ -z "$FAILED_PODS" ]; then
            echo "✅ Все поды здоровы"
            STATUS="✅ SUCCESS"
            MESSAGE="Все поды в кластере работают нормально"
          else
            echo "❌ Найдены проблемные поды:"
            echo "$FAILED_PODS"
            STATUS="❌ FAILED"
            MESSAGE="Обнаружены проблемные поды в кластере!"
          fi
          
          # Отправляем в Slack (если настроен токен)
          if [ -n "$SLACK_TOKEN" ] && [ -n "$SLACK_CHANNEL" ]; then
            curl -X POST -H "Authorization: Bearer $SLACK_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{
                \"channel\": \"$SLACK_CHANNEL\",
                \"text\": \"*$STATUS*\n$MESSAGE\nВремя: $(date)\nХост: $(hostname)\n\n*Все поды:*\n\`\`\`\n$ALL_PODS\n\`\`\`\" \
                $([ -n \"$FAILED_PODS\" ] && echo \"\n\n*Проблемные поды:*\n\`\`\`\n$FAILED_PODS\n\`\`\`\")
              }" \
              https://slack.com/api/chat.postMessage
          else
            echo "Slack не настроен — пропускаем уведомление"
          fi