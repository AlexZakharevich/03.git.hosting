name: Minikube Cluster Setup

on:
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  minikube-cluster:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Minikube
        uses: medyagh/setup-minikube@v0.0.18
        with:
          minikube-version: 'v1.38.0'
          driver: docker
          kubernetes-version: 'v1.30.0'
          start-args: '--cpus=2 --memory=4096'
      
      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.30.0'
      
      - name: Verify cluster
        run: |
          echo "=== Minikube Status ==="
          minikube status
          echo "=== Cluster Info ==="
          kubectl cluster-info
          echo "=== Nodes ==="
          kubectl get nodes -o wide
          echo "=== Pods in all namespaces ==="
          kubectl get pods -A
      
      - name: Get cluster details
        run: |
          echo "## Кластер Minikube" >> $GITHUB_STEP_SUMMARY
          echo "- Узлов: $(kubectl get nodes --no-headers | wc -l)" >> $GITHUB_STEP_SUMMARY
          echo "- Версия Kubernetes: $(kubectl version -o json | jq -r '.serverVersion.gitVersion')" >> $GITHUB_STEP_SUMMARY
          echo "- Версия Minikube: $(minikube version)" >> $GITHUB_STEP_SUMMARY
          echo "- Время создания: $(date)" >> $GITHUB_STEP_SUMMARY
      
      - name: Show timing information
        run: |
          echo "=== Timing ==="
          echo "Cluster ready at: $(date)"
          START_TIME=$(date +%s)
          echo "Если нужно замерить время запуска - проверьте логи выше"
      
      - name: Run tests (optional)
        run: |
          # Проверяем, что кластер работает
          kubectl run test-pod --image=nginx --restart=Never
          kubectl wait --for=condition=ready pod/test-pod --timeout=60s
          kubectl delete pod test-pod
          echo "✅ Кластер работает корректно"