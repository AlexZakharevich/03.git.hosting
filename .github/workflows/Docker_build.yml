name: Docker image

on:
  release:
    types: [published]
  push:
    branches:
      - "master"

env:
  # ✅ Выносим повторяющиеся значения в переменные
  REGISTRY: ghcr.io
  IMAGE_NAME: my_flask_app
  IMAGE_TAG: v1

jobs:
  push_to_registries:
    name: Push Docker image
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    steps:
      - name: 📥 Check out the repo
        uses: actions/checkout@v4

      # ✅ Обновляем до актуальной версии @v3
      - name: 🔐 Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.CR_TOKEN }}

      # ✅ Сборка и пуш образа
      - name: 🏗️ Build and push Docker image
        uses: docker/build-push-action@v5
        id: build  # ← Добавляем id для возможного использования в уведомлениях
        with:
          context: ./08.Docker.DockerCompose/hw2
          push: true
          tags: ${{ env.REGISTRY }}/alexzakharevich/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          # ✅ Добавляем метаданные для трассировки
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      # ✅ Уведомление об успехе
      - name: 🔔 Notify Slack on Success
        if: success()
        uses: slackapi/slack-github-action@v2
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          # ✅ Исправленный JSON: экранирование кавычек и корректная структура
          payload: |
            {
              "channel": "${{ secrets.SLACK_CHANNEL_ID }}",
              "text": "✅ Сборка успешна!",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*✅ Docker Build Successful*\n📦 Образ: `${{ env.REGISTRY }}/alexzakharevich/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}`\n🔖 Репозиторий: `${{ github.repository }}`\n🔗 Ветка: `${{ github.ref_name }}`"
                  }
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {"type": "plain_text", "text": "🔗 Открыть лог сборки"},
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }

      # ✅ Уведомление об ошибке
      - name: 🔔 Notify Slack on Failure
        if: failure()
        uses: slackapi/slack-github-action@v2
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            {
              "channel": "${{ secrets.SLACK_CHANNEL_ID }}",
              "text": "❌ Ошибка сборки!",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*❌ Docker Build Failed*\n🔖 Репозиторий: `${{ github.repository }}`\n🔗 Ветка: `${{ github.ref_name }}`\n🔢 "
                  }
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {"type": "plain_text", "text": "🚨 Посмотреть лог"},
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
                      "style": "danger"
                    }
                  ]
                }
              ]
            }